<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CHAIN⛓️Link - Connect with creators, share content, and build your community">
    <title>CHAIN⛓️Link - Connect & Create</title>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&vault=true&intent=subscription&currency=USD"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>

    <!-- QR Code for 2FA -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* ==========================================
           CSS VARIABLES & DESIGN SYSTEM
           ========================================== */
        :root {
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --bg-card: #1F1F1F;
            --bg-hover: #2D2D2D;
            --bg-live: #1a0f0f;
            --bg-premium: linear-gradient(135deg, #1a1500 0%, #0D0D0D 100%);

            --gold-primary: #FCD34D;
            --gold-secondary: #FDE68A;
            --gold-dark: #D4A574;
            --gold-gradient: linear-gradient(135deg, #FCD34D 0%, #FDE68A 50%, #D4A574 100%);
            --gold-glow: 0 0 20px rgba(252, 211, 77, 0.3);

            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --text-muted: #737373;
            --text-gold: #FCD34D;

            --accent-red: #EF4444;
            --accent-green: #22C55E;
            --accent-blue: #3B82F6;
            --accent-purple: #A855F7;
            --accent-pink: #EC4899;
            --accent-orange: #F97316;

            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.5);
            --shadow-gold: 0 0 20px rgba(252, 211, 77, 0.3);

            --font-primary: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-display: 'Georgia', 'Times New Roman', serif;
            --font-mono: 'Courier New', monospace;
            --font-cursive: 'Brush Script MT', cursive;
            --font-bold: 'Impact', sans-serif;

            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;

            --z-dropdown: 100;
            --z-sticky: 200;
            --z-modal: 300;
            --z-live: 400;
            --z-toast: 500;
        }

        [dir="rtl"] { --text-align: right; }

        /* ==========================================
           RESET & BASE
           ========================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: var(--radius-full); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes ringPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(252, 211, 77, 0.4); } 50% { box-shadow: 0 0 0 4px rgba(252, 211, 77, 0.1); } }
        @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .animate-fadeIn { animation: fadeIn 0.3s ease; }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-live { animation: livePulse 2s infinite; }

        /* Utility Classes */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--gold-gradient); color: #000; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-gold); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--bg-hover); }
        .btn-secondary:hover:not(:disabled) { border-color: var(--gold-primary); }
        .btn-outline { background: transparent; color: var(--gold-primary); border: 2px solid var(--gold-primary); }
        .btn-outline:hover:not(:disabled) { background: var(--gold-primary); color: #000; }
        .btn-live { background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%); color: #fff; }
        .btn-live:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        .btn-premium { background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 50%, #D97706 100%); color: #000; font-weight: 700; }

        /* Forms */
        .form-group { margin-bottom: var(--space-md); }
        .form-label { display: block; margin-bottom: var(--space-xs); font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); }
        .form-input, .form-textarea {
            width: 100%;
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all var(--transition-fast);
        }
        .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--gold-primary); background: var(--bg-hover); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-textarea { min-height: 100px; resize: vertical; font-family: inherit; }

        /* Cards */
        .card { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; }

        /* Avatars */
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid transparent; }
        .avatar-lg { width: 80px; height: 80px; }
        .avatar-xl { width: 120px; height: 120px; }
        .avatar-bordered { border-color: var(--gold-primary); }

        /* Story Ring Avatar */
        .story-avatar-container { position: relative; width: 56px; height: 56px; cursor: pointer; flex-shrink: 0; }
        .story-ring { position: absolute; inset: 0; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 3px; animation: ringPulse 2s infinite; }
        .story-ring::before { content: ''; position: absolute; inset: 3px; background: var(--bg-card); border-radius: 50%; }
        .story-avatar { position: absolute; inset: 3px; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg-card); z-index: 1; }
        .story-camera-icon { position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px; background: var(--gold-primary); border: 2px solid var(--bg-card); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 0.625rem; z-index: 2; }
        .story-ring.live { background: linear-gradient(45deg, #EF4444 0%, #DC2626 50%, #991B1B 100%); animation: livePulse 2s infinite; }

        /* Toasts */
        .toast-container { position: fixed; top: var(--space-lg); right: var(--space-lg); z-index: var(--z-toast); display: flex; flex-direction: column; gap: var(--space-sm); max-width: 400px; }
        .toast { display: flex; align-items: center; gap: var(--space-sm); padding: var(--space-md); background: var(--bg-card); border-radius: var(--radius-md); border-left: 4px solid var(--gold-primary); box-shadow: var(--shadow-lg); animation: slideInRight 0.3s ease; }
        .toast.success { border-left-color: var(--accent-green); }
        .toast.error { border-left-color: var(--accent-red); }
        .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; margin-left: auto; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); z-index: var(--z-modal); display: flex; align-items: center; justify-content: center; padding: var(--space-md); opacity: 0; visibility: hidden; transition: all var(--transition-normal); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-card); border-radius: var(--radius-xl); max-width: 500px; width: 100%; max-height: 90vh; overflow: hidden; transform: scale(0.9) translateY(20px); transition: all var(--transition-normal); }
        .modal-overlay.active .modal { transform: scale(1) translateY(0); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--bg-tertiary); }
        .modal-title { font-size: 1.25rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .modal-body { padding: var(--space-lg); overflow-y: auto; max-height: calc(90vh - 120px); }
        .modal-footer { display: flex; gap: var(--space-sm); padding: var(--space-md) var(--space-lg); border-top: 1px solid var(--bg-tertiary); }

        /* Tabs */
        .tabs { display: flex; gap: var(--space-xs); padding: var(--space-xs); background: var(--bg-tertiary); border-radius: var(--radius-md); margin-bottom: var(--space-lg); }
        .tab { flex: 1; padding: var(--space-sm) var(--space-md); background: transparent; border: none; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all var(--transition-fast); }
        .tab.active { background: var(--gold-primary); color: #000; }

        /* Font Styles */
        .font-default { font-family: var(--font-primary); }
        .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }
        .font-cursive { font-family: var(--font-cursive); }
        .font-bold { font-family: var(--font-bold); }

        /* ==========================================
           LAYOUT
           ========================================== */
        #app { min-height: 100vh; display: flex; flex-direction: column; }

        .main-layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--bg-tertiary); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: var(--z-sticky); transition: transform var(--transition-normal); }
        .sidebar-header { padding: var(--space-lg); border-bottom: 1px solid var(--bg-tertiary); }
        .sidebar-logo { display: flex; align-items: center; gap: var(--space-sm); font-size: 1.5rem; font-weight: 800; }
        .sidebar-logo-icon { font-size: 2rem; filter: drop-shadow(0 0 10px rgba(252, 211, 77, 0.5)); }
        .sidebar-logo-text { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-nav { flex: 1; padding: var(--space-md); overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-sm) var(--space-md); border-radius: var(--radius-md); color: var(--text-secondary); text-decoration: none; font-size: 1rem; font-weight: 500; transition: all var(--transition-fast); margin-bottom: var(--space-xs); position: relative; }
        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: var(--gold-primary); color: #000; }
        .nav-item i { width: 24px; text-align: center; font-size: 1.25rem; }
        .nav-badge { position: absolute; right: var(--space-md); background: var(--accent-red); color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: var(--radius-full); }
        .sidebar-footer { padding: var(--space-md); border-top: 1px solid var(--bg-tertiary); }

        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; display: flex; flex-direction: column; }

        /* Top Header */
        .top-header { position: sticky; top: 0; background: rgba(13, 13, 13, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--bg-tertiary); padding: var(--space-sm) var(--space-lg); display: flex; align-items: center; justify-content: space-between; z-index: var(--z-sticky); }
        .header-search { position: relative; width: 100%; max-width: 400px; }
        .header-search input { width: 100%; padding: var(--space-sm) var(--space-md) var(--space-sm) 40px; background: var(--bg-tertiary); border: none; border-radius: var(--radius-full); color: var(--text-primary); font-size: 0.875rem; }
        .header-search input:focus { outline: none; box-shadow: 0 0 0 2px var(--gold-primary); }
        .header-search i { position: absolute; left: var(--space-md); top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .header-actions { display: flex; align-items: center; gap: var(--space-sm); }
        .header-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: none; border-radius: 50%; color: var(--text-secondary); font-size: 1.125rem; cursor: pointer; transition: all var(--transition-fast); position: relative; }
        .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .header-btn .notification-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; }

        .page-content { flex: 1; padding: var(--space-lg); overflow-y: auto; }

        /* ==========================================
           FEED & POSTS
           ========================================== */
        .feed-container { max-width: 600px; margin: 0 auto; }

        .create-post { background: var(--bg-card); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: var(--space-lg); }
        .create-post-header { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-md); }
        .create-post-input { flex: 1; }
        .create-post-input textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 1rem; resize: none; min-height: 60px; font-family: inherit; }
        .create-post-input textarea:focus { outline: none; }
        .create-post-input textarea::placeholder { color: var(--text-muted); }
        .create-post-actions { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-sm); }
        .create-post-tools { display: flex; gap: var(--space-xs); align-items: center; }
        .post-tool-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; border-radius: 50%; color: var(--gold-primary); font-size: 1.125rem; cursor: pointer; transition: all var(--transition-fast); }
        .post-tool-btn:hover { background: var(--bg-tertiary); }
        
        /* Font Selector */
        .font-selector { display: flex; gap: var(--space-xs); }
        .font-option { padding: 6px 10px; background: var(--bg-tertiary); border: 2px solid transparent; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; transition: all var(--transition-fast); }
        .font-option.active { border-color: var(--gold-primary); color: var(--gold-primary); }

        /* Post Cards */
        .post-card { background: var(--bg-card); border-radius: var(--radius-lg); margin-bottom: var(--space-lg); overflow: hidden; animation: fadeIn 0.3s ease; }
        .post-card.profile-update { background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-hover) 100%); border: 2px solid var(--gold-primary); }
        .post-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md); }
        .post-author { display: flex; align-items: center; gap: var(--space-sm); }
        .post-author-info { display: flex; flex-direction: column; }
        .post-author-name { display: flex; align-items: center; gap: var(--space-xs); font-weight: 600; font-size: 0.875rem; }
        .post-author-handle { font-size: 0.75rem; color: var(--text-muted); }
        .post-content { padding: 0 var(--space-md) var(--space-md); }
        .post-text { font-size: 0.9375rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .post-media { border-radius: var(--radius-md); overflow: hidden; margin-top: var(--space-sm); }
        .post-media img, .post-media video { width: 100%; max-height: 500px; object-fit: cover; display: block; }
        .post-hashtags { display: flex; flex-wrap: wrap; gap: var(--space-xs); padding: 0 var(--space-md) var(--space-sm); }
        .post-stats { display: flex; gap: var(--space-lg); padding: var(--space-sm) var(--space-md); border-top: 1px solid var(--bg-tertiary); font-size: 0.875rem; color: var(--text-muted); }
        .post-actions { display: flex; justify-content: space-around; padding: var(--space-sm) var(--space-md); border-top: 1px solid var(--bg-tertiary); }
        .post-action { display: flex; align-items: center; gap: var(--space-xs); padding: var(--space-sm) var(--space-md); background: none; border: none; color: var(--text-muted); font-size: 0.875rem; cursor: pointer; transition: all var(--transition-fast); border-radius: var(--radius-md); }
        .post-action:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .post-action.active { color: var(--gold-primary); }
        .post-action.love.active { color: var(--accent-red); }

        /* Comments Section */
        .comments-section { padding: var(--space-md); border-top: 1px solid var(--bg-tertiary); background: var(--bg-secondary); }
        .comments-disabled { text-align: center; padding: var(--space-md); color: var(--text-muted); }
        .comment-input { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); }
        .comment-input input { flex: 1; background: var(--bg-tertiary); border: none; border-radius: var(--radius-full); padding: var(--space-sm) var(--space-md); color: var(--text-primary); }
        .comment-input input:focus { outline: none; box-shadow: 0 0 0 2px var(--gold-primary); }
        .comment { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); }
        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 0.875rem; margin-bottom: 2px; }
        .comment-text { font-size: 0.875rem; color: var(--text-secondary); }
        .comment-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        /* ==========================================
           PROFILE PAGE (Instagram Style)
           ========================================== */
        .profile-header { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--space-lg); }
        .profile-banner { height: 200px; background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-dark) 100%); position: relative; }
        .profile-info { padding: 0 var(--space-lg) var(--space-lg); position: relative; }
        
        /* Instagram-style 4-column stats */
        .profile-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-md);
            padding: var(--space-md) 0;
            border-top: 1px solid var(--bg-tertiary);
            margin-top: var(--space-md);
            text-align: center;
        }
        .profile-stat-item { display: flex; flex-direction: column; gap: 4px; }
        .profile-stat-value { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
        .profile-stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .profile-stat-divider { width: 1px; background: var(--bg-tertiary); }

        .profile-avatar-container { margin-top: -60px; position: relative; display: inline-block; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--bg-card); object-fit: cover; }
        .profile-avatar-edit { position: absolute; bottom: 0; right: 0; width: 36px; height: 36px; background: var(--gold-primary); border: 3px solid var(--bg-card); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; cursor: pointer; }
        
        .profile-actions { display: flex; gap: var(--space-sm); margin-top: var(--space-md); justify-content: flex-end; }
        .profile-name-section { margin-top: var(--space-md); }
        .profile-name { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: var(--space-xs); }
        .profile-handle { color: var(--text-muted); font-size: 1rem; margin-top: 4px; }
        .profile-bio { margin-top: var(--space-sm); font-size: 0.9375rem; line-height: 1.6; }
        
        /* Subscription Badge */
        .subscription-tier {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--gold-gradient);
            color: #000;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: var(--space-sm);
        }

        /* Profile Tabs */
        .profile-tabs { display: flex; border-top: 1px solid var(--bg-tertiary); margin-top: var(--space-lg); }
        .profile-tab { flex: 1; padding: var(--space-md); background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all var(--transition-fast); display: flex; align-items: center; justify-content: center; gap: var(--space-xs); }
        .profile-tab.active { color: var(--gold-primary); border-bottom-color: var(--gold-primary); }
        .profile-tab i { font-size: 1rem; }

        /* ==========================================
           LIVE STREAMING
           ========================================== */
        .live-container { max-width: 800px; margin: 0 auto; }

            const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <div class="toast-content"><div class="toast-message">${message}</div></div>
                <button class="toast-close" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function checkRateLimit(action, limit = 10, windowMs = 60000) {
            const key = `${action}_${state.currentUser?.id || 'anonymous'}`;
            const now = Date.now();
            const attempts = state.rateLimit.get(key) || [];
            const validAttempts = attempts.filter(time => now - time < windowMs);
            if (validAttempts.length >= limit) {
                showToast('Rate limit exceeded', 'error');
                return false;
            }
            validAttempts.push(now);
            state.rateLimit.set(key, validAttempts);
            return true;
        }

        function extractHashtags(text) {
            const hashtags = [];
            const regex = /#(\w+)/g;
            let match;
            while ((match = regex.exec(text)) !== null) hashtags.push(match[1].toLowerCase());
            return hashtags;
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (seconds < 60) return 'just now';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;
            return date.toLocaleDateString();
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==========================================
        // AUTHENTICATION
        // ==========================================
        async function signUp(email, password, username, displayName) {
            if (!checkRateLimit('signup', 3, 300000)) return;
            
            try {
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password
                });
                
                if (authError) throw authError;
                
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{
                        id: authData.user.id,
                        username,
                        display_name: displayName,
                        created_at: new Date().toISOString()
                    }]);
                
                if (profileError) throw profileError;
                
                showToast('Account created successfully! Please check your email.', 'success');
                return authData.user;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }

        async function signIn(email, password) {
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                state.currentUser = data.user;
                await loadUserProfile(data.user.id);
                showToast('Welcome back!', 'success');
                navigateTo('home');
                return data.user;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }

        async function signInWithGoogle(response) {
            try {
                const { data, error } = await supabase.auth.signInWithIdToken({
                    provider: 'google',
                    token: response.credential
                });
                
                if (error) throw error;
                
                state.currentUser = data.user;
                
                // Check if profile exists
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', data.user.id)
                    .single();
                
                if (!profile) {
                    await supabase.from('profiles').insert([{
                        id: data.user.id,
                        username: data.user.email.split('@')[0],
                        display_name: data.user.user_metadata?.full_name || data.user.email.split('@')[0],
                        avatar_url: data.user.user_metadata?.avatar_url,
                        created_at: new Date().toISOString()
                    }]);
                }
                
                await loadUserProfile(data.user.id);
                showToast('Welcome to CHAIN⛓️Link!', 'success');
                navigateTo('home');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

            await supabase.auth.signOut();
            state.currentUser = null;
            state.currentProfile = null;
            navigateTo('auth');

                .single();
            
            if (data) {
                state.currentProfile = data;
                state.blockedUsers = new Set(data.blocked_users || []);

        function showCreatePostTools() {
            document.getElementById('createPostTools').style.display = 'block';

        function setFont(font) {
            state.currentFont = font;
            document.querySelectorAll('.font-option').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('postContent').className = 'font-' + font;
        }

        function handleMediaSelect(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                state.selectedMedia = { type, data: e.target.result, file };
                const preview = document.getElementById('mediaPreview');
                if (type === 'image') {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-height: 200px; border-radius: 8px;">`;
                } else {
                    preview.innerHTML = `<video src="${e.target.result}" controls style="max-height: 200px; border-radius: 8px;"></video>`;
                }
            };
            reader.readAsDataURL(file);
        }

        async function createPost() {
            const content = document.getElementById('postContent').value;
            const disableComments = document.getElementById('disableComments').checked;
            
            if (!content.trim() && !state.selectedMedia) {
                showToast('Please enter some content or add media', 'warning');
                return;
            }
            
            if (!checkRateLimit('post', 5, 60000)) return;
            
            try {
                let mediaUrl = null;
                let mediaType = null;
                
                if (state.selectedMedia) {
                    const fileExt = state.selectedMedia.file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                    
                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('videos')
                        .upload(fileName, state.selectedMedia.file);
                    
                    if (uploadError) throw uploadError;
                    
                    const { data: { publicUrl } } = supabase.storage
                        .from('videos')
                        .getPublicUrl(fileName);
                    
                    mediaUrl = publicUrl;
                    mediaType = state.selectedMedia.type;
                }
                
                const hashtags = extractHashtags(content);
                
                const { error } = await supabase.from('posts').insert([{
                    user_id: state.currentUser.id,
                    content,
                    media_url: mediaUrl,
                    media_type: mediaType,
                    font_style: state.currentFont,
                    disable_comments: disableComments,
                    hashtags,
                    created_at: new Date().toISOString()
                }]);
                
                if (error) throw error;
                
                document.getElementById('postContent').value = '';
                document.getElementById('mediaPreview').innerHTML = '';
                document.getElementById('createPostTools').style.display = 'none';
                state.selectedMedia = null;
                
                showToast('Post created!', 'success');
                loadFeed();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function loadFeed() {
            const feedContainer = document.getElementById('feedPosts');
            if (!feedContainer) return;
            
            feedContainer.innerHTML = '<div class="text-center" style="padding: 40px;"><div class="spinner"></div></div>';
            
            try {
                const { data: posts, error } = await supabase
                    .from('posts')
                    .select('*, profiles:user_id(*), post_likes(*), post_comments(count)')
                    .order('created_at', { ascending: false })
                    .limit(20);
                
                if (error) throw error;
                
                if (posts.length === 0) {
                    feedContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                            <h3 class="empty-state-title">No posts yet</h3>
                            <p class="empty-state-text">Be the first to share something!</p>
                        </div>
                    `;
                    return;
                }
                
                feedContainer.innerHTML = posts.map(post => renderPostCard(post)).join('');
            } catch (error) {
                showToast('Failed to load feed', 'error');
            }
        }

            return `
                <article class="post-card ${post.is_profile_update ? 'profile-update' : ''}" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-author" onclick="navigateTo('profile', {userId: '${post.user_id}'})">
                            <img src="${post.profiles?.avatar_url || 'https://via.placeholder.com/40'}" class="avatar">

                                <div class="post-author-name">

                                </div>
                                <span class="post-author-handle">@${escapeHtml(post.profiles?.username || 'unknown')}</span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px;">

                    <div class="post-content">
                        <p class="post-text font-${post.font_style || 'default'}">${escapeHtml(post.content)}</p>
                        ${post.media_url ? `
                            <div class="post-media">
                                ${post.media_type === 'video' 
                                    ? `<video src="${post.media_url}" controls playsinline></video>`
                                    : `<img src="${post.media_url}" alt="Post image">`
                                }
                            </div>
                        ` : ''}
                    </div>
                    ${post.hashtags?.length ? `
                        <div class="post-hashtags">
                            ${post.hashtags.map(tag => `<span style="color: var(--gold-primary); margin-right: 8px;">#${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="post-stats">
                        <span>${formatNumber(likeCount)} likes</span>
                        <span>${formatNumber(commentCount)} comments</span>
                        <span>${formatTime(post.created_at)}</span>
                    </div>
                    <div class="post-actions">
                        <button class="post-action love ${isLiked ? 'active' : ''}" onclick="toggleLike('${post.id}')">
                            <i class="fas fa-heart"></i>
                            <span>${t('love')}</span>
                        </button>
                        <button class="post-action" onclick="toggleComments('${post.id}')">
                            <i class="fas fa-comment"></i>
                            <span>${t('comment')}</span>
                        </button>
                        <button class="post-action" onclick="sharePost('${post.id}')">

                            <span>${t('share')}</span>

                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display: none;">
                        ${post.disable_comments ? `
                            <div class="comments-disabled">
                                <i class="fas fa-lock" style="margin-right: 8px;"></i>
                                Comments are disabled for this post
                            </div>
                        ` : `
                            <div class="comment-input">
                                <img src="${state.currentProfile?.avatar_url || 'https://via.placeholder.com/32'}" class="avatar" style="width: 32px; height: 32px;">
                                <input type="text" placeholder="${t('writeComment')}" 
                                       onkeypress="if(event.key==='Enter') addComment('${post.id}', this.value)">

        async function toggleLike(postId) {
            if (!checkRateLimit('like', 20, 60000)) return;
            
            try {
                const { data: existing } = await supabase
                    .from('post_likes')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', state.currentUser.id)
                    .single();
                
                if (existing) {
                    await supabase.from('post_likes').delete().eq('id', existing.id);
                } else {
                    await supabase.from('post_likes').insert([{
                        post_id: postId,
                        user_id: state.currentUser.id,
                        created_at: new Date().toISOString()
                    }]);
                }
                
                loadFeed();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            if (section.style.display === 'none') {
                section.style.display = 'block';
                loadComments(postId);
            } else {
                section.style.display = 'none';
            }
        }

        async function loadComments(postId) {
            const container = document.getElementById(`comments-list-${postId}`);
            if (!container) return;
            
            try {
                const { data: comments, error } = await supabase
                    .from('post_comments')
                    .select('*, profiles:user_id(*)')
                    .eq('post_id', postId)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                if (comments.length === 0) {
                    container.innerHTML = `<div style="text-align: center; padding: 20px; color: var(--text-muted);">${t('noComments')}</div>`;
                    return;
                }
                
                container.innerHTML = comments.map(comment => `
                    <div class="comment">
                        <img src="${comment.profiles?.avatar_url || 'https://via.placeholder.com/32'}" class="avatar" style="width: 32px; height: 32px;">
                        <div class="comment-content">
                            <div class="comment-author">${escapeHtml(comment.profiles?.display_name || 'Unknown')}</div>
                            <div class="comment-text">${escapeHtml(comment.content)}</div>
                            <div class="comment-time">${formatTime(comment.created_at)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load comments:', error);
            }
        }

        async function addComment(postId, content) {
            if (!content.trim()) return;
            if (!checkRateLimit('comment', 10, 60000)) return;
            
            try {
                const { error } = await supabase.from('post_comments').insert([{
                    post_id: postId,
                    user_id: state.currentUser.id,
                    content,
                    created_at: new Date().toISOString()
                }]);
                
                if (error) throw error;
                
                event.target.value = '';
                loadComments(postId);
                loadFeed();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function deletePost(postId) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            
            try {
                const { error } = await supabase.from('posts').delete().eq('id', postId);
                if (error) throw error;
                showToast('Post deleted', 'success');
                loadFeed();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function sharePost(postId) {
            const url = `${window.location.origin}/post/${postId}`;

            showToast('Link copied to clipboard!', 'success');

        // ==========================================
        // PROFILE
        // ==========================================
        async function loadProfile(userId) {
            if (!userId) userId = state.currentUser.id;
            
            try {
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();
                
                if (error) throw error;
                
                state.viewingProfile = profile;
                
                // Load stats
                const { count: postsCount } = await supabase
                    .from('posts')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', userId);
                
                const { count: followersCount } = await supabase
                    .from('follows')
                    .select('*', { count: 'exact', head: true })
                    .eq('following_id', userId);
                
                const { count: followingCount } = await supabase
                    .from('follows')
                    .select('*', { count: 'exact', head: true })
                    .eq('follower_id', userId);
                
                state.profileStats = { posts: postsCount, followers: followersCount, following: followingCount };
                
                // Check if following
                const { data: followData } = await supabase
                    .from('follows')
                    .select('*')
                    .eq('follower_id', state.currentUser.id)
                    .eq('following_id', userId)
                    .single();
                
                state.isFollowing = !!followData;
                
                // Load user's posts
                const { data: posts } = await supabase
                    .from('posts')
                    .select('*, post_likes(*), post_comments(count)')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                state.profilePosts = posts || [];
                
                renderApp();
            } catch (error) {
                showToast('Failed to load profile', 'error');
            }
        }

        async function updateAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `avatar_${state.currentUser.id}_${Date.now()}.${fileExt}`;
                
                const { error: uploadError } = await supabase.storage
                    .from('avatars')
                    .upload(fileName, file);
                
                if (uploadError) throw uploadError;
                
                const { data: { publicUrl } } = supabase.storage
                    .from('avatars')
                    .getPublicUrl(fileName);
                
                await supabase.from('profiles')
                    .update({ avatar_url: publicUrl })
                    .eq('id', state.currentUser.id);
                
                state.currentProfile.avatar_url = publicUrl;
                showToast('Avatar updated!', 'success');
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

            document.querySelectorAll('.profile-tab').forEach(el => el.classList.remove('active'));
            event.target.closest('.profile-tab').classList.add('active');
            
            const content = document.getElementById('profileContent');
            if (tab === 'posts') {
                content.innerHTML = state.profilePosts?.map(post => renderPostCard(post)).join('') || '<div class="empty-state">No posts yet</div>';
            } else if (tab === 'media') {
                const mediaPosts = state.profilePosts?.filter(p => p.media_url) || [];
                content.innerHTML = mediaPosts.length ? mediaPosts.map(post => renderPostCard(post)).join('') : '<div class="empty-state">No media yet</div>';
            } else if (tab === 'likes') {

        async function loadConversations() {
            try {
                const { data: messages, error } = await supabase
                    .from('messages')
                    .select('*, sender:sender_id(*), recipient:recipient_id(*)')
                    .or(`sender_id.eq.${state.currentUser.id},recipient_id.eq.${state.currentUser.id}`)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                // Group by conversation
                const conversations = {};
                messages.forEach(msg => {
                    const otherId = msg.sender_id === state.currentUser.id ? msg.recipient_id : msg.sender_id;
                    if (!conversations[otherId]) {
                        conversations[otherId] = {
                            user: msg.sender_id === state.currentUser.id ? msg.recipient : msg.sender,
                            lastMessage: msg,
                            unread: msg.recipient_id === state.currentUser.id && !msg.read ? 1 : 0
                        };
                    } else if (msg.recipient_id === state.currentUser.id && !msg.read) {
                        conversations[otherId].unread++;
                    }
                });
                
                const listContainer = document.getElementById('conversationsList');
                if (!listContainer) return;
                
                if (Object.keys(conversations).length === 0) {
                    listContainer.innerHTML = '<div style="padding: 24px; text-align: center; color: var(--text-muted);">No conversations yet</div>';
                    return;
                }
                
                listContainer.innerHTML = Object.values(conversations).map(conv => `
                    <div class="conversation-item ${conv.unread > 0 ? 'unread' : ''}" onclick="openChat('${conv.user.id}')">
                        <img src="${conv.user.avatar_url || 'https://via.placeholder.com/48'}" class="avatar" style="width: 48px; height: 48px;">
                        <div class="conversation-info">
                            <div class="conversation-name">${escapeHtml(conv.user.display_name || conv.user.username)}</div>
                            <div class="conversation-preview">${escapeHtml(conv.lastMessage.content.substring(0, 30))}${conv.lastMessage.content.length > 30 ? '...' : ''}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="conversation-time">${formatTime(conv.lastMessage.created_at)}</div>
                            ${conv.unread > 0 ? `<div class="conversation-unread">${conv.unread}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load conversations:', error);
            }
        }

        async function openChat(userId) {
            state.currentChat = userId;
            
            const { data: user } = await supabase.from('profiles').select('*').eq('id', userId).single();
            
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="chat-header">
                    <img src="${user?.avatar_url || 'https://via.placeholder.com/40'}" class="avatar">
                    <div class="chat-header-info">
                        <div class="chat-header-name">
                            ${escapeHtml(user?.display_name || 'Unknown')}
                            <span class="subscription-status ${state.subscriptions.has(userId) ? 'premium' : 'free'}">
                                ${state.subscriptions.has(userId) ? '★ Premium' : 'Free'}
                            </span>
                        </div>
                    </div>
                    <button class="chat-action-btn" onclick="startVideoChat()">
                        <i class="fas fa-video"></i>
                    </button>
                    <button class="chat-action-btn" onclick="closeChat()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <div class="chat-input">
                        <button class="chat-action-btn"><i class="fas fa-plus"></i></button>
                        <input type="text" id="messageInput" placeholder="${t('typeMessage')}" onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="chat-send-btn" onclick="sendMessage()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                ${renderVideoChatOverlay()}
            `;
            
            loadChatMessages(userId);
            
            // Subscribe to new messages
            supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    if ((payload.new.sender_id === userId && payload.new.recipient_id === state.currentUser.id) ||
                        (payload.new.sender_id === state.currentUser.id && payload.new.recipient_id === userId)) {
                        loadChatMessages(userId);
                    }
                })
                .subscribe();
        }

        async function loadChatMessages(userId) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            try {
                const { data: messages, error } = await supabase
                    .from('messages')
                    .select('*')
                    .or(`and(sender_id.eq.${state.currentUser.id},recipient_id.eq.${userId}),and(sender_id.eq.${userId},recipient_id.eq.${state.currentUser.id})`)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.sender_id === state.currentUser.id ? 'sent' : ''}">
                        <div class="message-bubble">
                            <div>${escapeHtml(msg.content)}</div>
                            <div class="message-time">${formatTime(msg.created_at)}</div>
                        </div>
                    </div>
                `).join('');
                
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Failed to load messages:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            try {
                const { error } = await supabase.from('messages').insert([{
                    sender_id: state.currentUser.id,
                    recipient_id: state.currentChat,
                    content,
                    created_at: new Date().toISOString()
                }]);
                
                if (error) throw error;
                
                input.value = '';
                loadChatMessages(state.currentChat);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function loadExplore() {

                .from('posts')
                .select('hashtags')
                .not('hashtags', 'is', null);
            
            const counts = {};
            hashtags?.forEach(post => {
                post.hashtags?.forEach(tag => {
                    counts[tag] = (counts[tag] || 0) + 1;
                });
            });
            
            const trending = Object.entries(counts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            const tagsContainer = document.getElementById('trendingHashtags');
            if (tagsContainer) {

                    </span>
                `).join('');
            }
            
            // Load random posts
            const { data: posts } = await supabase
                .from('posts')
                .select('*, profiles:user_id(*), post_likes(*), post_comments(count)')
                .order('created_at', { ascending: false })
                .limit(20);
            
            const container = document.getElementById('explorePosts');

                supabase.channel('public:posts')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
                        if (state.currentPage === 'home') loadFeed();
                    })
                    .subscribe();
            }
        }

        async function init() {
            if (!initSupabase()) return;
            
            // Check for existing session
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                state.currentUser = session.user;
                await loadUserProfile(session.user.id);
            }
            
            renderApp();
            
            // Auth state changes
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    state.currentUser = session.user;
                    await loadUserProfile(session.user.id);
                    renderApp();
                } else if (event === 'SIGNED_OUT') {
                    state.currentUser = null;
                    state.currentProfile = null;
                    renderApp();
                }
            });
        }

        // Start the app
        init();
    </script>
</body>
</html>
