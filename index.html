<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My CHAIN ⛓️‍💥 Link</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=7WEUUYSTA5HY8&vault=true&intent=subscription&currency=USD"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --primary: #d4c76a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* View Switching Logic */
        .view { display: none; min-height: 100vh; padding-bottom: 80px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header & Branding */
        header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #333;
            background: rgba(10, 10, 10, 0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h1 {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            margin: 0;
        }

        .tagline {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Post Creation UI */
        .create-post-container {
            background: var(--card-bg);
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
        }

        .camera-btn {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Camera Overlay */
        #camera-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 5000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #camera-video { width: 100%; max-width: 500px; border-radius: 10px; }
        .shutter { width: 70px; height: 70px; border: 5px solid #fff; border-radius: 50%; background: transparent; cursor: pointer; }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 2000;
        }

        .nav-item { color: var(--text-dim); font-size: 1.2rem; cursor: pointer; }
        .nav-item.active { color: #bf953f; }

        /* General Buttons */
        .btn-main { background: var(--primary); color: black; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>My CHAIN ⛓️‍💥 Link</h1>
        <div class="tagline">Link up with your chain ⛓🔗⛓</div>
    </header>

    <main id="home-view" class="view active">
        <div class="create-post-container">
            <textarea id="post-input" placeholder="What's on your mind?" style="width:100%; background:transparent; color:white; border:none; outline:none; resize:none; height:60px;"></textarea>
            <div id="media-preview" style="margin: 10px 0;"></div>
            <button class="camera-btn" onclick="startCamera()">
                <i class="fa-solid fa-camera"></i> Capture Link
            </button>
            <button class="btn-main" onclick="publishPost()">Post to Chain</button>
        </div>
        <div id="feed" style="padding:15px; text-align:center; color:var(--text-dim);">
            Loading your chain...
        </div>
    </main>

    <main id="msg-view" class="view">
        <div style="padding:50px 20px; text-align:center;">
            <i class="fa-solid fa-lock" style="font-size:3rem; color:var(--primary); margin-bottom:20px;"></i>
            <h3>Direct Messaging</h3>
            <p style="color:var(--text-dim);">Unlock private links by supporting the community.</p>
            <button class="btn-main" onclick="switchTab('vault')" style="width:auto;">View Vault</button>
        </div>
    </main>

    <main id="vault-view" class="view">
        <div style="padding:20px; text-align:center;">
            <h2 style="color:var(--primary);">Creator Vault</h2>
            <div style="background:var(--card-bg); padding:25px; border-radius:20px; border:1px solid var(--primary);">
                <h3>Authentic Supporter</h3>
                <h1 style="font-size:2.5rem;">$4.99/mo</h1>
                <div id="paypal-button-container"></div>
            </div>
        </div>
    </main>

    <main id="profile-view" class="view">
        <div style="text-align:center; padding:40px 20px;">
            <div style="width:80px; height:80px; border-radius:50%; background:var(--gold-gradient); margin:0 auto; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:1.5rem;">ME</div>
            <h2 id="profile-name">Official Developer</h2>
            <p style="color:var(--text-dim);">Artist • Writer • Creator</p>
        </div>
    </main>

    <div id="camera-modal">
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <div style="margin-top:30px; display:flex; gap:40px; align-items:center;">
            <button onclick="stopCamera()" style="color:white; background:none; border:none; font-size:1rem;">Cancel</button>
            <button class="shutter" onclick="capturePhoto()"></button>
            <div style="width:50px;"></div> </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="switchTab('msg')"><i class="fa-solid fa-message"></i></div>
        <div class="nav-item" onclick="switchTab('vault')"><i class="fa-solid fa-gem"></i></div>
        <div class="nav-item" onclick="switchTab('profile')"><i class="fa-solid fa-user"></i></div>
    </nav>

    <script>
        // Project Credentials
        const URL = 'https://vjaevzohcnejkaduvtno.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqYWV2em9oY25lamthZHV2dG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0MTMzMDcsImV4cCI6MjA4NTk4OTMwN30.d6tcsct8aFqUZXBnR_3S7okNBvH6Csc1QBqGwlG6CWs';
        const supabase = supabase.createClient(URL, KEY);

        let currentBlob = null;

        // View Navigation
        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            
            // Highlight active nav item
            const navItems = document.querySelectorAll('.nav-item');
            const map = { home: 0, msg: 1, vault: 2, profile: 3 };
            navItems[map[tabId]].classList.add('active');
        }

        // Camera Logic (Enforced: No Gallery Uploads)
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('camera-video').srcObject = stream;
                document.getElementById('camera-modal').style.display = 'flex';
            } catch (err) {
                alert("Camera error: Please ensure permissions are granted.");
            }
        }

        function stopCamera() {
            const video = document.getElementById('camera-video');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('camera-modal').style.display = 'none';
        }

        function capturePhoto() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob((blob) => {
                currentBlob = blob;
                const previewUrl = URL.createObjectURL(blob);
                document.getElementById('media-preview').innerHTML = `<img src="${previewUrl}" style="width:100%; border-radius:10px; border: 1px solid var(--primary);">`;
                stopCamera();
            }, 'image/jpeg');
        }

        async function publishPost() {
            const text = document.getElementById('post-input').value;
            if (!text && !currentBlob) return alert("Write something or capture a link!");
            
            // Logic to upload currentBlob to Supabase Storage and Insert into 'posts' table would go here
            alert("Post submitted to the Chain!");
            document.getElementById('post-input').value = "";
            document.getElementById('media-preview').innerHTML = "";
            currentBlob = null;
        }

        // Initialize PayPal for Vault
        if (document.getElementById('paypal-button-container')) {
            paypal.Buttons({
                createSubscription: (data, actions) => actions.subscription.create({ 'plan_id': 'P-7WEUUYSTA5HY8' }),
                onApprove: (data, actions) => alert('Welcome to the Vault!')
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
