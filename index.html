<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CHAIN Link - The social media platform that lets you be you. No filters, no gallery uploads, just real connections.">
    <meta name="theme-color" content="#0D0D0D">
    <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
    <title>CHAIN⛓️Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Space+Mono&family=Dancing+Script&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --chain-dark: #0D0D0D;
            --chain-yellow: #F4D03F;
            --chain-gray: #1A1A1A;
            --chain-light: #E0E0E0;
        }
        
        * { box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--chain-dark);
            color: var(--chain-light);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        
        .focus-visible:focus-visible {
            outline: 2px solid var(--chain-yellow);
            outline-offset: 2px;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        
        .camera-modal {
            backdrop-filter: blur(20px);
            background: rgba(13, 13, 13, 0.98);
        }
        
        .capture-btn {
            width: 72px;
            height: 72px;
            border: 4px solid var(--chain-yellow);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            background: transparent;
        }
        
        .capture-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            background: var(--chain-yellow);
            border-radius: 50%;
            transition: transform 0.1s;
        }
        
        .capture-btn:active { transform: scale(0.95); }
        .capture-btn:active::after { transform: translate(-50%, -50%) scale(0.85); }
        
        .post-input {
            min-height: 120px;
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.125rem;
            resize: none;
            caret-color: var(--chain-yellow);
            font-family: 'Inter', sans-serif;
        }
        
        .post-input:focus { outline: none; }
        .post-input::placeholder { color: #6B7280; }
        
        .mention-highlight {
            color: var(--chain-yellow);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        
        .mention-highlight:hover { text-decoration: underline; }
        
        .hashtag-highlight {
            color: #60A5FA;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        
        .hashtag-highlight:hover { text-decoration: underline; }
        
        .mention-dropdown {
            position: absolute;
            left: 0;
            right: 0;
            top: 100%;
            margin-top: 0.5rem;
            background: var(--chain-gray);
            border: 1px solid #333;
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 50;
            max-height: 250px;
            overflow-y: auto;
            animation: slideUp 0.2s ease-out;
        }
        
        .chat-bubble {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }
        
        .chat-bubble-sent {
            background: var(--chain-yellow);
            color: var(--chain-dark);
            margin-left: auto;
            border-bottom-right-radius: 0.25rem;
        }
        
        .chat-bubble-received {
            background: var(--chain-gray);
            color: white;
            margin-right: auto;
            border-bottom-left-radius: 0.25rem;
        }
        
        .request-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #EF4444;
            color: white;
            font-size: 0.625rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.15s;
        }
        
        .flash.active { opacity: 1; }
        
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        .demo-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 40;
            background: rgba(244, 208, 63, 0.2);
            border: 1px solid var(--chain-yellow);
            color: var(--chain-yellow);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        
        .view-section {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        
        .view-section.active { display: block; }
        
        /* Profile ring style */
        .profile-ring {
            border: 2px solid var(--chain-yellow);
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        
        /* Gender-based outlines */
        .profile-male { border-color: #60A5FA; }
        .profile-female { border-color: #F472B6; }
        .profile-other { border-color: #A78BFA; }
        .profile-unspecified { border-color: var(--chain-yellow); }
        
        @media (max-width: 640px) {
            .mobile-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(13, 13, 13, 0.95);
                backdrop-filter: blur(10px);
                border-top: 1px solid var(--chain-gray);
                padding: 0.5rem 1rem;
                display: flex;
                justify-content: space-around;
                z-index: 30;
                padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
            }
        }
        
        @media (min-width: 641px) {
            .mobile-nav { display: none; }
        }
    </style>
</head>
