<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="CHAIN⛓️Link - Connect with creators, share content, and build your community">
    <title>CHAIN⛓️Link - Connect & Create</title>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&vault=true&intent=subscription&currency=USD"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>

    <!-- QR Code for 2FA -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* ========== CSS VARIABLES & DESIGN SYSTEM ========== */
        :root {
            /* Primary Colors - Dark Charcoal + Gold */
            --bg-primary: #0D0D0D;
            --bg-secondary: #1A1A1A;
            --bg-tertiary: #262626;
            --bg-card: #1F1F1F;
            --bg-hover: #2D2D2D;

            /* Gold/Yellow Accent Colors */
            --gold-primary: #FCD34D;
            --gold-secondary: #FDE68A;
            --gold-dark: #D4A574;
            --gold-gradient: linear-gradient(135deg, #FCD34D 0%, #FDE68A 50%, #D4A574 100%);

            /* Text Colors */
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --text-muted: #737373;
            --text-gold: #FCD34D;

            /* Accent Colors */
            --accent-red: #EF4444;
            --accent-green: #22C55E;
            --accent-blue: #3B82F6;
            --accent-purple: #A855F7;

            /* Spacing */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;

            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.5);
            --shadow-gold: 0 0 20px rgba(252, 211, 77, 0.3);

            /* Typography */
            --font-primary: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-display: 'Georgia', 'Times New Roman', serif;
            --font-mono: 'Courier New', monospace;
            --font-cursive: 'Brush Script MT', cursive;
            --font-bold: 'Impact', sans-serif;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;

            /* Z-Index Scale */
            --z-dropdown: 100;
            --z-sticky: 200;
            --z-modal: 300;
            --z-toast: 500;
        }

        /* RTL Support */
        [dir="rtl"] { --text-align: right; }

        /* ========== RESET & BASE ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: var(--radius-full); }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold-secondary); }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes ringPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(252, 211, 77, 0.4); } 50% { box-shadow: 0 0 0 4px rgba(252, 211, 77, 0.1); } }

        .animate-fadeIn { animation: fadeIn 0.3s ease; }
        .animate-fadeInUp { animation: fadeInUp 0.4s ease; }
        .animate-slideInRight { animation: slideInRight 0.3s ease; }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-spin { animation: spin 0.8s linear infinite; }

        /* ========== UTILITY CLASSES ========== */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-1 { gap: var(--space-xs); }
        .gap-2 { gap: var(--space-sm); }
        .gap-3 { gap: var(--space-md); }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .text-center { text-align: center; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pointer { cursor: pointer; }
        .relative { position: relative; }
        .overflow-hidden { overflow: hidden; }
        .rounded-full { border-radius: var(--radius-full); }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: var(--gold-gradient);
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--bg-hover);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--gold-primary);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold-primary);
            border: 2px solid var(--gold-primary);
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--gold-primary);
            color: #000;
        }

        .btn-danger {
            background: var(--accent-red);
            color: #fff;
        }

        .btn-lg { padding: var(--space-md) var(--space-lg); font-size: 1rem; }
        .btn-sm { padding: var(--space-xs) var(--space-sm); font-size: 0.75rem; }

        /* ========== FORMS ========== */
        .form-group { margin-bottom: var(--space-md); position: relative; }

        .form-label {
            display: block;
            margin-bottom: var(--space-xs);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold-primary);
            background: var(--bg-hover);
        }

        .form-input::placeholder { color: var(--text-muted); }

        /* Password visibility toggle */
        .password-toggle {
            position: absolute;
            right: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: var(--space-xs);
        }

        .password-toggle:hover { color: var(--gold-primary); }

        /* ========== CARDS ========== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* ========== AVATAR STYLES ========== */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            transition: all var(--transition-fast);
        }

        .avatar-sm { width: 32px; height: 32px; }
        .avatar-md { width: 48px; height: 48px; }
        .avatar-lg { width: 64px; height: 64px; }
        .avatar-xl { width: 96px; height: 96px; }

        .avatar-bordered { border-color: var(--gold-primary); }

        /* Story Ring Avatar (IG/TikTok Style) */
        .story-avatar-container {
            position: relative;
            width: 56px;
            height: 56px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .story-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 3px;
            animation: ringPulse 2s infinite;
        }

        .story-ring::before {
            content: '';
            position: absolute;
            inset: 3px;
            background: var(--bg-card);
            border-radius: 50%;
        }

        .story-avatar {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-card);
            z-index: 1;
        }

        .story-camera-icon {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            background: var(--gold-primary);
            border: 2px solid var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.625rem;
            z-index: 2;
        }

        .avatar-container { position: relative; display: inline-block; }

        .avatar-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-card);
        }

        .avatar-status.online { background: var(--accent-green); }
        .avatar-status.away { background: var(--status-away); }
        .avatar-status.offline { background: var(--status-offline); }

        /* ========== BADGES ========== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-gold { background: var(--gold-primary); color: #000; }
        .badge-verified { background: var(--accent-blue); color: #fff; }

        /* ========== TOAST NOTIFICATIONS ========== */
        .toast-container {
            position: fixed;
            top: var(--space-lg);
            right: var(--space-lg);
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-width: 400px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-md);
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--gold-primary);
            box-shadow: var(--shadow-lg);
            animation: slideInRight 0.3s ease;
        }

        .toast.success { border-left-color: var(--accent-green); }
        .toast.error { border-left-color: var(--accent-red); }
        .toast.warning { border-left-color: #F59E0B; }
        .toast.info { border-left-color: var(--accent-blue); }

        .toast-icon { font-size: 1.25rem; }
        .toast-content { flex: 1; }
        .toast-message { font-size: 0.875rem; }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            transition: color var(--transition-fast);
        }

        .toast-close:hover { color: var(--text-primary); }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: var(--z-modal);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-normal);
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: all var(--transition-normal);
        }

        .modal-overlay.active .modal { transform: scale(1) translateY(0); }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .modal-title { font-size: 1.25rem; font-weight: 700; }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color var(--transition-fast);
        }

        .modal-close:hover { color: var(--text-primary); }

        .modal-body {
            padding: var(--space-lg);
            overflow-y: auto;
            max-height: calc(90vh - 120px);
        }

        .modal-footer {
            display: flex;
            gap: var(--space-sm);
            padding: var(--space-md) var(--space-lg);
            border-top: 1px solid var(--bg-tertiary);
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: var(--space-xs);
            padding: var(--space-xs);
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-lg);
        }

        .tab {
            flex: 1;
            padding: var(--space-sm) var(--space-md);
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .tab:hover { color: var(--text-primary); }
        .tab.active { background: var(--gold-primary); color: #000; }

        /* ========== DROPDOWN ========== */
        .dropdown { position: relative; }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: var(--space-xs);
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            min-width: 200px;
            z-index: var(--z-dropdown);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all var(--transition-fast);
        }

        .dropdown.active .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .dropdown-item:hover { background: var(--bg-tertiary); }
        .dropdown-item i { width: 20px; text-align: center; color: var(--text-muted); }
        .dropdown-divider { height: 1px; background: var(--bg-tertiary); margin: var(--space-xs) 0; }

        /* ========== HASHTAG ========== */
        .hashtag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            color: var(--gold-primary);
            font-size: 0.875rem;
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .hashtag:hover { background: var(--gold-primary); color: #000; }

        /* ========== FONT STYLES FOR POSTS ========== */
        .font-default { font-family: var(--font-primary); }
        .font-display { font-family: var(--font-display); }
        .font-mono { font-family: var(--font-mono); }
        .font-cursive { font-family: var(--font-cursive); }
        .font-bold { font-family: var(--font-bold); }

        /* ========== APP CONTAINER ========== */
        #app { min-height: 100vh; display: flex; flex-direction: column; }

        /* ========== AUTH PAGES (CLEAN STYLING) ========== */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            position: relative;
            overflow: hidden;
        }

        /* Lightest grey chain emojis for login page - just a hair smaller now */
        .auth-page::before {
            content: '⛓️';
            position: absolute;
            font-size: 3.75rem; /* Slightly smaller (was 4rem) */
            color: #f5f5f5; /* Lightest grey instead of white */
            opacity: 0.15;
            top: 10%;
            left: 5%;
            animation: float 6s ease-in-out infinite;
            text-shadow: none;
        }

        .auth-page::after {
            content: '🔗';
            position: absolute;
            font-size: 3.75rem; /* Slightly smaller (was 4rem) */
            color: #f5f5f5; /* Lightest grey instead of white */
            opacity: 0.15;
            bottom: 10%;
            right: 5%;
            animation: float 6s ease-in-out infinite reverse;
            text-shadow: none;
        }

        .auth-container { width: 100%; max-width: 420px; z-index: 1; }

        .auth-logo { text-align: center; margin-bottom: var(--space-xl); }

        .auth-logo-icon { 
            font-size: 3.75rem; /* Slightly smaller (was 4rem) */
            margin-bottom: var(--space-sm); 
            filter: drop-shadow(0 0 10px rgba(252, 211, 77, 0.5)); 
        }

        .auth-logo-text {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo-subtitle { color: var(--text-secondary); font-size: 0.875rem; margin-top: var(--space-xs); }

        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-lg);
        }

        .auth-title { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: var(--space-lg); }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin: var(--space-lg) 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--bg-tertiary);
        }

        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            background: #fff;
            border: none;
            border-radius: var(--radius-md);
            color: #000;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .google-btn:hover { background: #f5f5f5; transform: translateY(-1px); }

        .auth-footer { text-align: center; margin-top: var(--space-lg); color: var(--text-secondary); font-size: 0.875rem; }
        .auth-footer a { color: var(--gold-primary); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        .language-selector { position: absolute; top: var(--space-md); right: var(--space-md); }

        .language-btn {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-xs) var(--space-sm);
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
        }

        /* ========== INSPIRATION QUOTE ========== */
        .inspiration-quote {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-hover) 100%);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            border-left: 4px solid var(--gold-primary);
        }

        .inspiration-quote-text { font-size: 1rem; font-style: italic; color: var(--text-primary); margin-bottom: var(--space-sm); }
        .inspiration-quote-author { font-size: 0.875rem; color: var(--gold-primary); }

        /* ========== MAIN APP LAYOUT ========== */
        .main-layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: var(--z-sticky);
            transition: transform var(--transition-normal);
        }

        .sidebar-header { padding: var(--space-lg); border-bottom: 1px solid var(--bg-tertiary); }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 1.5rem;
            font-weight: 800;
        }

        .sidebar-logo-icon { font-size: 2rem; }

        .sidebar-logo-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-nav { flex: 1; padding: var(--space-md); overflow-y: auto; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            margin-bottom: var(--space-xs);
        }

        .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-item.active { background: var(--gold-primary); color: #000; }
        .nav-item i { width: 24px; text-align: center; font-size: 1.25rem; }

        .nav-badge {
            margin-left: auto;
            background: var(--accent-red);
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }

        .sidebar-footer { padding: var(--space-md); border-top: 1px solid var(--bg-tertiary); }

        .user-mini-profile {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .user-mini-profile:hover { background: var(--bg-tertiary); }

        .user-mini-info { flex: 1; min-width: 0; }
        .user-mini-name { font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-mini-handle { font-size: 0.75rem; color: var(--text-muted); }

        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; display: flex; flex-direction: column; }

        /* Top Header */
        .top-header {
            position: sticky;
            top: 0;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--bg-tertiary);
            padding: var(--space-sm) var(--space-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: var(--z-sticky);
        }

        .header-search { position: relative; width: 100%; max-width: 400px; }

        .header-search input {
            width: 100%;
            padding: var(--space-sm) var(--space-md) var(--space-sm) 40px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-full);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .header-search input:focus { outline: none; box-shadow: 0 0 0 2px var(--gold-primary); }
        .header-search i { position: absolute; left: var(--space-md); top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .header-actions { display: flex; align-items: center; gap: var(--space-sm); }

        .header-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 1.125rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        .header-btn .notification-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
        }

        /* Page Content */
        .page-content { flex: 1; padding: var(--space-lg); overflow-y: auto; }

        /* ========== FEED ========== */
        .feed-container { max-width: 600px; margin: 0 auto; }

        /* Updated Create Post with Story Ring */
        .create-post {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .create-post-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-md);
        }

        .create-post-input { flex: 1; }

        .create-post-input textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }

        .create-post-input textarea:focus { outline: none; }
        .create-post-input textarea::placeholder { color: var(--text-muted); }

        .create-post-actions { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-sm); }

        .create-post-tools { display: flex; gap: var(--space-xs); }

        .post-tool-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 50%;
            color: var(--gold-primary);
            font-size: 1.125rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .post-tool-btn:hover { background: var(--bg-tertiary); }

        /* Font Selector */
        .font-selector { display: flex; gap: var(--space-xs); margin-right: var(--space-md); }

        .font-option {
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .font-option:hover { color: var(--text-primary); }
        .font-option.active { border-color: var(--gold-primary); color: var(--gold-primary); }

        /* Post Card */
        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-lg);
            overflow: hidden;
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md);
        }

        .post-author { display: flex; align-items: center; gap: var(--space-sm); }

        .post-author-info { display: flex; flex-direction: column; }

        .post-author-name {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .post-author-handle { font-size: 0.75rem; color: var(--text-muted); }
        .post-time { font-size: 0.75rem; color: var(--text-muted); }

        .post-menu-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: var(--space-xs);
        }

        .post-content { padding: 0 var(--space-md) var(--space-md); }

        .post-text { font-size: 0.9375rem; line-height: 1.6; margin-bottom: var(--space-sm); white-space: pre-wrap; word-wrap: break-word; }

        .post-media { border-radius: var(--radius-md); overflow: hidden; margin-top: var(--space-sm); }

        .post-media img, .post-media video { width: 100%; max-height: 500px; object-fit: cover; display: block; }

        .post-hashtags { display: flex; flex-wrap: wrap; gap: var(--space-xs); padding: 0 var(--space-md) var(--space-sm); }

        .post-stats {
            display: flex;
            gap: var(--space-lg);
            padding: var(--space-sm) var(--space-md);
            border-top: 1px solid var(--bg-tertiary);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .post-stat { cursor: pointer; transition: color var(--transition-fast); }
        .post-stat:hover { color: var(--text-primary); }

        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: var(--space-sm) var(--space-md);
            border-top: 1px solid var(--bg-tertiary);
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-sm) var(--space-md);
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            border-radius: var(--radius-md);
        }

        .post-action:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .post-action.active { color: var(--gold-primary); }
        .post-action.love.active { color: var(--accent-red); }
        .post-action i { font-size: 1.125rem; }

        /* Profile Update Post Style */
        .profile-update-post {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-hover) 100%);
            border: 2px solid var(--gold-primary);
        }

        .profile-update-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: var(--gold-primary);
            color: #000;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: var(--space-sm);
        }

        /* Comments Section */
        .comments-section {
            padding: var(--space-md);
            border-top: 1px solid var(--bg-tertiary);
            background: var(--bg-secondary);
        }

        .comments-disabled { text-align: center; padding: var(--space-md); color: var(--text-muted); font-size: 0.875rem; }

        .comment-input { display: flex; gap: var(--space-sm); margin-bottom: var(--space-md); }

        .comment-input input {
            flex: 1;
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-full);
            padding: var(--space-sm) var(--space-md);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .comment-input input:focus { outline: none; box-shadow: 0 0 0 2px var(--gold-primary); }

        /* ========== RIGHT SIDEBAR (WIDGETS) ========== */
        .right-sidebar { width: 350px; padding: var(--space-lg); border-left: 1px solid var(--bg-tertiary); display: none; }

        @media (min-width: 1200px) { .right-sidebar { display: block; } }

        .widget { background: var(--bg-card); border-radius: var(--radius-lg); padding: var(--space-md); margin-bottom: var(--space-lg); }

        .widget-title { font-size: 1.125rem; font-weight: 700; margin-bottom: var(--space-md); display: flex; align-items: center; gap: var(--space-sm); }
        .widget-title i { color: var(--gold-primary); }

        /* Trending Hashtags Widget */
        .trending-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-sm) 0;
            border-bottom: 1px solid var(--bg-tertiary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .trending-item:last-child { border-bottom: none; }
        .trending-item:hover { color: var(--gold-primary); }

        .trending-rank { font-size: 1.25rem; font-weight: 700; color: var(--text-muted); width: 30px; }
        .trending-rank.top { color: var(--gold-primary); }

        .trending-info { flex: 1; }
        .trending-tag { font-weight: 600; font-size: 0.875rem; }
        .trending-count { font-size: 0.75rem; color: var(--text-muted); }

        /* ========== PROFILE PAGE ========== */
        .profile-header { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: var(--space-lg); }

        .profile-banner {
            height: 200px;
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-dark) 100%);
            position: relative;
        }

        .profile-banner-edit {
            position: absolute;
            bottom: var(--space-md);
            right: var(--space-md);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            padding: var(--space-xs) var(--space-sm);
            font-size: 0.75rem;
            cursor: pointer;
        }

        .profile-info { padding: 0 var(--space-lg) var(--space-lg); position: relative; }

        .profile-avatar-container { margin-top: -50px; position: relative; display: inline-block; }

        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg-card); object-fit: cover; }

        .profile-avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            background: var(--gold-primary);
            border: 2px solid var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .profile-actions { display: flex; gap: var(--space-sm); margin-top: var(--space-md); justify-content: flex-end; }
        .profile-name-section { margin-top: var(--space-md); }

        .profile-name { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: var(--space-xs); }
        .profile-handle { color: var(--text-muted); font-size: 0.875rem; }
        .profile-bio { margin-top: var(--space-sm); font-size: 0.9375rem; line-height: 1.6; }

        .profile-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-md);
            margin-top: var(--space-sm);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .profile-meta-item { display: flex; align-items: center; gap: var(--space-xs); }
        .profile-meta-item i { color: var(--gold-primary); }

        .profile-stats {
            display: flex;
            gap: var(--space-lg);
            margin-top: var(--space-md);
            padding-top: var(--space-md);
            border-top: 1px solid var(--bg-tertiary);
        }

        .profile-stat { display: flex; gap: var(--space-xs); font-size: 0.875rem; }
        .profile-stat-value { font-weight: 700; color: var(--text-primary); }
        .profile-stat-label { color: var(--text-muted); }

        /* ========== MESSAGES ========== */
        .messages-layout { display: flex; height: calc(100vh - 70px); }

        .conversations-list { width: 350px; border-right: 1px solid var(--bg-tertiary); overflow-y: auto; }
        .conversations-header { padding: var(--space-md); border-bottom: 1px solid var(--bg-tertiary); }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-md);
            cursor: pointer;
            transition: background var(--transition-fast);
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .conversation-item:hover { background: var(--bg-tertiary); }
        .conversation-item.active { background: var(--bg-tertiary); border-left: 3px solid var(--gold-primary); }
        .conversation-item.unread .conversation-name { font-weight: 700; }
        .conversation-item.unread .conversation-preview { color: var(--text-primary); }

        .conversation-info { flex: 1; min-width: 0; }

        .conversation-header { display: flex; justify-content: space-between; align-items: center; }
        .conversation-name { font-weight: 600; font-size: 0.875rem; }
        .conversation-time { font-size: 0.75rem; color: var(--text-muted); }
        .conversation-preview { font-size: 0.875rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .conversation-unread { background: var(--gold-primary); color: #000; font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-full); }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-secondary); }

        .chat-header {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-md);
            border-bottom: 1px solid var(--bg-tertiary);
            background: var(--bg-card);
        }

        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; }
        .chat-header-status { font-size: 0.75rem; color: var(--text-muted); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .message { display: flex; gap: var(--space-sm); max-width: 70%; }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }

        .message-bubble {
            background: var(--bg-tertiary);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            border-bottom-left-radius: 4px;
        }

        .message.sent .message-bubble {
            background: var(--gold-primary);
            color: #000;
            border-bottom-left-radius: var(--radius-lg);
            border-bottom-right-radius: 4px;
        }

        .message-time { font-size: 0.75rem; color: var(--text-muted); margin-top: var(--space-xs); }

        .chat-input-area { padding: var(--space-md); border-top: 1px solid var(--bg-tertiary); background: var(--bg-card); }

        .chat-input { display: flex; gap: var(--space-sm); }

        .chat-input input {
            flex: 1;
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-full);
            padding: var(--space-sm) var(--space-md);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .chat-input input:focus { outline: none; box-shadow: 0 0 0 2px var(--gold-primary); }

        .chat-send-btn {
            width: 40px;
            height: 40px;
            background: var(--gold-primary);
            border: none;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .chat-send-btn:hover { transform: scale(1.1); }

        /* ========== NOTIFICATIONS ========== */
        .notifications-list { max-width: 600px; margin: 0 auto; }

        .notification-item {
            display: flex;
            align-items: flex-start;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .notification-item:hover { background: var(--bg-tertiary); }
        .notification-item.unread { border-left: 3px solid var(--gold-primary); }

        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .notification-icon.follow { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .notification-icon.like { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .notification-icon.comment { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .notification-icon.message { background: rgba(168, 85, 247, 0.2); color: var(--accent-purple); }

        .notification-content { flex: 1; }
        .notification-text { font-size: 0.875rem; line-height: 1.5; }
        .notification-text strong { color: var(--text-primary); }
        .notification-time { font-size: 0.75rem; color: var(--text-muted); margin-top: var(--space-xs); }

        /* ========== EXPLORE/SEARCH ========== */
        .explore-tabs { display: flex; gap: var(--space-md); margin-bottom: var(--space-lg); border-bottom: 1px solid var(--bg-tertiary); }

        .explore-tab {
            padding: var(--space-sm) var(--space-md);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .explore-tab:hover { color: var(--text-primary); }
        .explore-tab.active { color: var(--gold-primary); border-bottom-color: var(--gold-primary); }

        .explore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: var(--space-md); }

        .explore-item { aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; cursor: pointer; position: relative; }

        .explore-item img, .explore-item video { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-normal); }
        .explore-item:hover img, .explore-item:hover video { transform: scale(1.05); }

        .explore-item-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            display: flex;
            align-items: flex-end;
            padding: var(--space-md);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .explore-item:hover .explore-item-overlay { opacity: 1; }

        .explore-item-stats { display: flex; gap: var(--space-md); color: #fff; font-size: 0.875rem; }

        /* ========== SETTINGS ========== */
        .settings-container { max-width: 800px; margin: 0 auto; }

        .settings-section { background: var(--bg-card); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-lg); }

        .settings-section-title { font-size: 1.125rem; font-weight: 700; margin-bottom: var(--space-lg); padding-bottom: var(--space-sm); border-bottom: 1px solid var(--bg-tertiary); }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) 0;
            border-bottom: 1px solid var(--bg-tertiary);
        }

        .settings-item:last-child { border-bottom: none; }
        .settings-item-info { flex: 1; }
        .settings-item-title { font-weight: 600; font-size: 0.9375rem; }
        .settings-item-description { font-size: 0.875rem; color: var(--text-muted); margin-top: var(--space-xs); }

        /* Toggle Switch */
        .toggle { position: relative; width: 50px; height: 26px; }
        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            transition: all var(--transition-fast);
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: all var(--transition-fast);
        }

        .toggle input:checked + .toggle-slider { background: var(--gold-primary); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(24px); }

        /* ========== 2FA QR CODE ========== */
        .qr-container { text-align: center; padding: var(--space-lg); }

        .qr-code {
            background: #fff;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            display: inline-block;
            margin-bottom: var(--space-md);
        }

        .qr-code img { max-width: 200px; }

        .qr-secret {
            font-family: var(--font-mono);
            background: var(--bg-tertiary);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            word-break: break-all;
        }

        /* ========== EMPTY STATES ========== */
        .empty-state { text-align: center; padding: var(--space-2xl); }
        .empty-state-icon { font-size: 4rem; color: var(--text-muted); margin-bottom: var(--space-md); }
        .empty-state-title { font-size: 1.25rem; font-weight: 700; margin-bottom: var(--space-sm); }
        .empty-state-text { color: var(--text-muted); margin-bottom: var(--space-lg); }

        /* ========== VERIFICATION BADGE ========== */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: var(--accent-blue);
            border-radius: 50%;
            color: #fff;

        function initSupabase() {
            try {
                supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                console.log('Supabase initialized');
                return true;
            } catch (error) {
                console.error('Supabase init error:', error);
                showToast('Database connection failed', 'error');
                return false;

        // ========== TRANSLATION FUNCTION ==========
        function t(key) {
            const lang = state.language;
            return translations[lang]?.[key] || translations['en'][key] || key;
        }

        // ========== LANGUAGE MANAGEMENT ==========
        function setLanguage(lang) {
            state.language = lang;
            state.isRTL = lang === 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = state.isRTL ? 'rtl' : 'ltr';
            localStorage.setItem('chainlink_language', lang);
            renderApp();
        }

        function detectLanguage() {
            const saved = localStorage.getItem('chainlink_language');
            if (saved && translations[saved]) return saved;
            const browserLang = navigator.language.split('-')[0];
            if (translations[browserLang]) return browserLang;
            return 'en';
        }

        // ========== RATE LIMITING ==========
        function checkRateLimit(action, limit = 10, windowMs = 60000) {
            const key = `${action}_${state.currentUser?.id || 'anonymous'}`;
            const now = Date.now();
            const attempts = state.rateLimit.get(key) || [];
            const validAttempts = attempts.filter(time => now - time < windowMs);
            if (validAttempts.length >= limit) {
                showToast('Rate limit exceeded. Please try again later.', 'error');
                return false;
            }
            validAttempts.push(now);
            state.rateLimit.set(key, validAttempts);
            return true;
        }

        // ========== TOAST NOTIFICATIONS ==========
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <div class="toast-content">
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ========== AUTHENTICATION ==========
        async function signUp(email, password, username, displayName) {
            if (!checkRateLimit('signup')) return;
            try {
                const { data, error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { username, display_name: displayName } }
                });
                if (error) throw error;
                showToast(t('successAccountCreated') || 'Account created! Check your email.', 'success');
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }

        async function signIn(email, password) {
            if (!checkRateLimit('signin')) return;
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                state.currentUser = data.user;
                await loadUserProfile();
                showToast(t('welcomeBack'), 'success');
                renderApp();
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }

        async function signInWithGoogle(response) {
            try {
                const { data, error } = await supabase.auth.signInWithIdToken({
                    provider: 'google', token: response.credential
                });
                if (error) throw error;
                state.currentUser = data.user;
                await loadUserProfile();
                showToast(t('welcomeBack'), 'success');
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function signOut() {
            try {
                await supabase.auth.signOut();
                state.currentUser = null;
                state.currentProfile = null;
                showToast(t('signOut'), 'success');
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function resetPassword(email) {
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin
                });
                if (error) throw error;
                showToast(t('resetLinkSent') || 'Reset link sent to your email', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // ========== USER PROFILE ==========
        async function loadUserProfile() {
            if (!state.currentUser) return;
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', state.currentUser.id)
                    .single();
                if (error) throw error;
                state.currentProfile = data;
            } catch (error) {
                console.error('Load profile error:', error);
            }
        }

        async function updateProfile(updates, createPost = false, postCaption = '') {
            if (!state.currentUser) return;
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .update(updates)
                    .eq('id', state.currentUser.id)
                    .select()
                    .single();
                if (error) throw error;
                
                // Store old avatar for comparison
                const oldAvatar = state.currentProfile?.avatar_url;
                state.currentProfile = data;
                
                // If avatar was updated and user wants to share to feed
                if (createPost && updates.avatar_url && updates.avatar_url !== oldAvatar) {
                    await createPost(
                        postCaption || t('profileUpdateCaption'),
                        null,
                        [],
                        'default',
                        true,
                        true // is_profile_update flag
                    );
                    showToast('Profile updated and shared to feed!', 'success');
                } else {
                    showToast(t('successUpdated'), 'success');
                }
                
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }

        // ========== 2FA/TOTP ==========
        function generateTOTPSecret() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let secret = '';
            for (let i = 0; i < 32; i++) {
                secret += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return secret;
        }

        function showQRCodeModal(secret) {
            const otpauth = `otpauth://totp/CHAINLink:${state.currentUser.email}?secret=${secret}&issuer=CHAINLink`;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay active';
            modal.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3 class="modal-title">${t('enable2FA')}</h3>
                        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
                    </div>
                    <div class="modal-body">
                        <div class="qr-container">
                            <p style="margin-bottom: 16px;">${t('scanQRCode')}</p>
                            <div class="qr-code" id="qrCode"></div>
                            <p style="margin: 16px 0 8px; font-size: 0.875rem; color: var(--text-muted);">Or enter manually:</p>
                            <div class="qr-secret">${secret}</div>
                            <div class="form-group" style="margin-top: 24px;">
                                <label class="form-label">${t('enterCode')}</label>
                                <input type="text" class="form-input" id="totpCode" maxlength="6" placeholder="000000">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">${t('cancel')}</button>
                        <button class="btn btn-primary" onclick="verify2FA('${secret}')">${t('verify')}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            QRCode.toCanvas(document.getElementById('qrCode'), otpauth, { width: 200, margin: 2 });
        }

        async function verify2FA(secret) {
            const code = document.getElementById('totpCode').value;
            if (code.length !== 6) {
                showToast('Please enter a 6-digit code', 'error');
                return;
            }
            try {
                await supabase.auth.updateUser({
                    data: { totp_secret: secret, totp_enabled: true }
                });
                showToast('2FA enabled successfully!', 'success');
                document.querySelector('.modal-overlay').remove();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function enable2FA() {
            if (!state.currentUser) return;
            const secret = generateTOTPSecret();
            showQRCodeModal(secret);
        }

        // ========== POSTS ==========
        async function createPost(content, mediaUrl = null, hashtags = [], font = 'default', commentsEnabled = true, isProfileUpdate = false) {
            if (!state.currentUser) {
                showToast(t('errorAuth'), 'error');
                return;
            }
            if (!checkRateLimit('post', 5, 60000)) return;
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .insert({
                        user_id: state.currentUser.id, 
                        content, 
                        media_url: mediaUrl,
                        hashtags, 
                        font, 
                        comments_enabled: commentsEnabled,
                        is_profile_update: isProfileUpdate
                    })
                    .select()
                    .single();
                if (error) throw error;
                showToast(t('successPosted'), 'success');
                await loadPosts();
                renderApp();
                return data;
            } catch (error) {
                showToast(error.message, 'error');
                return null;
            }
        }

        async function loadPosts() {
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .select(`*, profiles:user_id (id, username, display_name, avatar_url, verified), reactions (*), comments:comments (count)`)
                    .order('created_at', { ascending: false })
                    .limit(50);
                if (error) throw error;
                state.posts = data || [];
            } catch (error) {
                console.error('Load posts error:', error);
            }
        }

                    .from('posts')
                    .delete()
                    .eq('id', postId)

                await loadPosts();
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function toggleComments(postId, enabled) {
            try {
                const { error } = await supabase
                    .from('posts')
                    .update({ comments_enabled: enabled })
                    .eq('id', postId)
                    .eq('user_id', state.currentUser.id);
                if (error) throw error;
                showToast(enabled ? t('turnOnComments') : t('turnOffComments'), 'success');
                await loadPosts();
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // ========== REACTIONS ==========
        async function addReaction(postId, type) {
            if (!state.currentUser) {
                showToast(t('errorAuth'), 'error');
                return;
            }
            if (!checkRateLimit('reaction', 20, 60000)) return;
            try {
                const { data: existing } = await supabase
                    .from('reactions')
                    .select('*')
                    .eq('post_id', postId)
                    .eq('user_id', state.currentUser.id)
                    .single();
                if (existing) {
                    if (existing.type === type) {
                        await supabase.from('reactions').delete().eq('id', existing.id);
                    } else {
                        await supabase.from('reactions').update({ type }).eq('id', existing.id);
                    }
                } else {
                    await supabase.from('reactions').insert({
                        post_id: postId, user_id: state.currentUser.id, type
                    });
                }
                await loadPosts();
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // ========== COMMENTS ==========
        async function addComment(postId, content) {
            if (!state.currentUser) {
                showToast(t('errorAuth'), 'error');
                return;
            }
            if (!checkRateLimit('comment', 10, 60000)) return;
            try {
                const { error } = await supabase
                    .from('comments')
                    .insert({ post_id: postId, user_id: state.currentUser.id, content });
                if (error) throw error;
                showToast(t('successPosted'), 'success');
                renderApp();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

            try {

                if (error) throw error;
                await createNotification(userId, 'follow');

        // ========== MESSAGES ==========
        async function sendMessage(receiverId, content) {
            if (!state.currentUser) return;
            if (!checkRateLimit('message', 30, 60000)) return;
            try {
                const { error } = await supabase
                    .from('messages')
                    .insert({ sender_id: state.currentUser.id, receiver_id: receiverId, content });
                if (error) throw error;
                await createNotification(receiverId, 'message');

            }
        }

        async function loadConversations() {
            if (!state.currentUser) return;
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select(`*, sender:profiles!sender_id (id, username, display_name, avatar_url), receiver:profiles!receiver_id (id, username, display_name, avatar_url)`)
                    .or(`sender_id.eq.${state.currentUser.id},receiver_id.eq.${state.currentUser.id}`)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                const conversations = {};
                data?.forEach(msg => {
                    const otherId = msg.sender_id === state.currentUser.id ? msg.receiver_id : msg.sender_id;
                    if (!conversations[otherId]) {
                        conversations[otherId] = {
                            user: msg.sender_id === state.currentUser.id ? msg.receiver : msg.sender,
                            lastMessage: msg, unread: 0
                        };
                    }
                    if (msg.receiver_id === state.currentUser.id && !msg.read) {
                        conversations[otherId].unread++;
                    }
                });
                state.conversations = Object.values(conversations);
            } catch (error) {
                console.error('Load conversations error:', error);
            }
        }

        // ========== NOTIFICATIONS ==========
        async function createNotification(userId, type, referenceId = null) {
            try {
                await supabase.from('notifications').insert({
                    user_id: userId, type, reference_id: referenceId, actor_id: state.currentUser?.id
                });
            } catch (error) {
                console.error('Create notification error:', error);
            }
        }

        async function loadNotifications() {
            if (!state.currentUser) return;
            try {
                const { data, error } = await supabase
                    .from('notifications')
                    .select(`*, actor:profiles!actor_id (username, display_name, avatar_url)`)
                    .eq('user_id', state.currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(50);
                if (error) throw error;
                state.notifications = data || [];
            } catch (error) {
                console.error('Load notifications error:', error);
            }
        }

            try {

            }
        }

        // ========== HASHTAGS ==========
        function extractHashtags(text) {
            const hashtags = [];
            const regex = /#(\w+)/g;
            let match;
            while ((match = regex.exec(text)) !== null) {
                hashtags.push(match[1].toLowerCase());
            }
            return hashtags;
        }

            const lang = state.language;
            const quotes = dailyQuotes[lang] || dailyQuotes['en'];
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            return quotes[dayOfYear % quotes.length];
        }

        // ========== HELPER FUNCTIONS ==========
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (seconds < 60) return 'just now';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;
            return date.toLocaleDateString();
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        function formatContent(content) {
            return content.replace(/#(\w+)/g, '<a href="#" class="hashtag" onclick="searchHashtag(\'$1\'); return false;">#$1</a>');
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';

        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleAvatarFileSelect(event) {

            if (!file) return;
            
            try {
                const fileName = `${state.currentUser.id}/${Date.now()}.${file.name.split('.').pop()}`;
                const { data, error } = await supabase.storage
                    .from('photos')
                    .upload(fileName, file, { cacheControl: '3600', upsert: true });
                
                if (error) throw error;
                
                const { data: { publicUrl } } = supabase.storage
                    .from('photos')
                    .getPublicUrl(fileName);
                
                const shareToFeed = document.getElementById('shareToFeed').checked;
                const caption = document.getElementById('profileUpdateCaption').value;
                
                await updateProfile({ avatar_url: publicUrl }, shareToFeed, caption);
                document.querySelector('.modal-overlay')?.remove();
                renderApp();
            } catch (error) {
                showToast('Upload failed: ' + error.message, 'error');
            }
        }

                        document.removeEventListener('click', closeMenu);
                    }
                });
            }, 100);
        }

        function confirmDeleteAccount() {
            if (confirm('Are you sure? This cannot be undone!')) {
                showToast('Account deletion requested', 'info');
            }
        }

        function showBlockedUsers() {
            showToast('Blocked users list coming soon', 'info');
        }

        function sharePost(postId) {
            if (navigator.share) {
                navigator.share({ title: 'CHAIN⛓️Link Post', url: window.location.origin + '?post=' + postId });
            } else {
                navigator.clipboard.writeText(window.location.origin + '?post=' + postId);
                showToast('Link copied to clipboard', 'success');
            }
        }

        async function openConversation(userId) {
            showToast('Opening conversation...', 'info');
        }

        async function markNotificationRead(notificationId) {
            try {
                await supabase.from('notifications').update({ read: true }).eq('id', notificationId);
                const notification = state.notifications.find(n => n.id === notificationId);
                if (notification) notification.read = true;
                renderApp();
            } catch (error) {
                console.error('Mark notification read error:', error);
            }
        }

        // ========== INITIALIZATION ==========
        async function init() {
            state.language = detectLanguage();
            setLanguage(state.language);
            if (!initSupabase()) return;
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                state.currentUser = session.user;
                await loadUserProfile();
                await loadPosts();
                await loadNotifications();
                await loadConversations();
            }
            renderApp();
            if (state.currentUser) {
                supabase.channel('notifications')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${state.currentUser.id}` },
                        payload => { state.notifications.unshift(payload.new); showToast('New notification!', 'info'); renderApp(); })
                    .subscribe();
                
                // Completed messages subscription
                supabase.channel('messages')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `receiver_id=eq.${state.currentUser.id}` },
                        payload => { 
                            loadConversations(); 
                            showToast('New message!', 'info'); 
                            renderApp(); 
                        })
                    .subscribe();
            }
        }
