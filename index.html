<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAIN⛓️Link - Be You. Connect. Create.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Dancing+Script:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD&vault=true&intent=subscription" async defer></script>
    
    <style>
        /* Styling already present in the original file */
    </style>
</head>
<body>
    <div class="app-container">
        <div class="profile-header">
            <h1>User Profile</h1>
            <p>Subscribe for exclusive content!</p>
        </div>

        <!-- PayPal Button -->
        <div id="paypal-button-container"></div>

        <script>
          paypal.Buttons({
            createSubscription: function (data, actions) {
              return actions.subscription.create({
                plan_id: "P-12345678ABCDEF" // Replace with your PayPal Plan ID
              });
            },
            onApprove: function (data, actions) {
              console.log('Subscription Approved:', data);
              alert(`Subscription successful! Subscription ID: ${data.subscriptionID}`);
            },
            onCancel: function (data) {
              console.log('Subscription Canceled:', data);
              alert('Subscription canceled! No action needed.');
            },
            onError: function (err) {
              console.error('Error during subscription:', err);
              alert('An error occurred during the subscription process.');
            }
          }).render('#paypal-button-container');
        </script>
    </div>
</body>
</html>
