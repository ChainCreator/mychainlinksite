<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAIN🔗Link | Connect & Create</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=7WEUUYSTA5HY8&vault=true&intent=subscription&currency=USD"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary: #d4c76a;
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --text: #e7e9ea;
            --accent: #e8d88a;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Navigation & Layout */
        .view { display: none; padding-bottom: 90px; min-height: 100vh; }
        .view.active { display: block; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            position: sticky; top: 0; background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: #000;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #333; z-index: 100;
        }

        .nav-item { color: #71767b; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }

        /* Vamped Elements */
        .live-badge { background: #e0245e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .post-card { background: var(--card); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .btn-action { background: none; border: none; color: #71767b; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--primary); font-size: 1.2rem;">CHAIN🔗Link</div>
        <div id="auth-status"></div>
    </header>

    <main id="home-view" class="view active">
        <div class="composer" style="padding: 15px; border-bottom: 1px solid #333;">
            <textarea id="post-input" placeholder="What is your truth today?" style="width:100%; background:none; border:none; color:white; font-size:1.1rem; resize:none; outline:none;"></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <div>
                    <button class="btn-action"><i class="fa-solid fa-image"></i></button>
                    <button class="btn-action" onclick="toggleComments()"><i class="fa-solid fa-comment-slash"></i></button>
                </div>
                <button onclick="publishPost()" style="background:var(--primary); padding:8px 20px; border-radius:20px; border:none; font-weight:bold;">Post</button>
            </div>
        </div>
        <div id="feed-container"></div>
    </main>

    <main id="live-view" class="view">
        <div style="padding: 20px; text-align: center;">
            <div id="video-container" style="width:100%; aspect-ratio:9/16; background:#000; border-radius:20px; position:relative; overflow:hidden;">
                <div class="live-badge" style="position:absolute; top:15px; left:15px;">LIVE</div>
                <video id="localVideo" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            </div>
            <button onclick="startStream()" style="margin-top:20px; background: #e0245e; color:white; padding:15px 40px; border-radius:30px; border:none; font-weight:bold;">START STREAMING</button>
        </div>
    </main>

    <main id="vault-view" class="view">
        <div style="padding: 20px;">
            <h2 style="color:var(--primary); text-align:center;">The Creator Vault</h2>
            <p style="text-align:center; color:#71767b; margin-bottom:30px;">Support authenticity by subscribing to your favorite creators.</p>
            
            <div class="post-card" style="text-align:center;">
                <h3>Authentic Supporter</h3>
                <h2 style="margin:10px 0;">$4.99/mo</h2>
                <ul style="list-style:none; padding:0; color:#71767b; margin-bottom:20px;">
                    <li>✓ Verified Badge 🔗</li>
                    <li>✓ Exclusive Live Access</li>
                    <li>✓ No Post Character Limit</li>
                </ul>
                <div id="paypal-button-container"></div>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="navigate('home')"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item" onclick="navigate('live')"><i class="fa-solid fa-tower-broadcast"></i></div>
        <div class="nav-item" onclick="navigate('vault')"><i class="fa-solid fa-gem"></i></div>
        <div class="nav-item" onclick="navigate('profile')"><i class="fa-solid fa-user"></i></div>
    </nav>

    <script>
        // --- 1. INITIALIZATION ---
        const SUPABASE_URL = 'https://vjaevzohcnejkaduvtno.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqYWV2em9oY25lamthZHV2dG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0MTMzMDcsImV4cCI6MjA4NTk4OTMwN30.d6tcsct8aFqUZXBnR_3S7okNBvH6Csc1QBqGwlG6CWs';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. NAVIGATION LOGIC ---
        function navigate(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- 3. PAYPAL SUBSCRIPTION INTEGRATION ---
        paypal.Buttons({
            style: { shape: 'pill', color: 'gold', layout: 'vertical', label: 'subscribe' },
            createSubscription: function(data, actions) {
                return actions.subscription.create({
                    'plan_id': 'P-7WEUUYSTA5HY8' // Replace with your actual PayPal Plan ID
                });
            },
            onApprove: function(data, actions) {
                alert('You are now a Verified Supporter! ID: ' + data.subscriptionID);
                updateVerificationStatus(true);
            }
        }).render('#paypal-button-container');

        // --- 4. LIVE STREAMING (WEBRTC MOCKUP) ---
        async function startStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = stream;
            } catch (err) {
                alert("Camera access denied. Authentic streaming requires camera permissions.");
            }
        }

        // --- 5. AUTHENTIC FEED LOGIC ---
        async function publishPost() {
            const content = document.getElementById('post-input').value;
            const { data, error } = await supabaseClient.from('posts').insert([
                { content: content, comments_enabled: true, likes_count: 0 }
            ]);
            if(!error) {
                document.getElementById('post-input').value = '';
                loadPosts();
            }
        }

        async function loadPosts() {
            const { data } = await supabaseClient.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            container.innerHTML = data.map(post => `
                <div class="post-card">
                    <p style="font-size:1.1rem;">${post.content}</p>
                    <div style="display:flex; gap:15px; margin-top:10px; color:#71767b;">
                        <button class="btn-action"><i class="fa-regular fa-heart"></i> ${post.likes_count}</button>
                        <button class="btn-action"><i class="fa-solid fa-arrow-down"></i></button> <button class="btn-action"><i class="fa-regular fa-comment"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // Initial Load
        window.onload = loadPosts;
    </script>
</body>
</html>
