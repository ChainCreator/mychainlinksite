<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CHAIN ⛓️‍💥 Link</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Variables from Html safe.pdf and Index.html.pdf */
        :root {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --bg-tertiary: #1A1A1A;
            --gold-gradient: linear-gradient(135deg, #FCD34D 0%, #FDE68A 50%, #D4A574 100%);
            --gold-primary: #FCD34D;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --border: #262626;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --shadow-gold: 0 0 20px rgba(252, 211, 77, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            line-height: 1.5;
        }

        /* Header Styling */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 60px; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            z-index: 1000; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .brand-title {
            font-size: 1.5rem; font-weight: 900;
            background: var(--gold-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        /* Camera & Action Button */
        .btn-gold {
            background: var(--gold-gradient); color: #000; border: none;
            padding: 10px 20px; border-radius: var(--radius-full);
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        .btn-gold:hover { transform: scale(1.05); box-shadow: var(--shadow-gold); }

        /* Main Content Area */
        .main-feed { max-width: 600px; margin: 80px auto; padding: 0 15px; }
        .tagline { color: var(--text-secondary); text-align: center; margin-bottom: 2rem; }

        /* Camera Modal */
        .camera-overlay {
            display: none; position: fixed; inset: 0;
            background: var(--bg-primary); z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .camera-overlay.active { display: flex; }
        video, canvas { width: 100%; max-width: 500px; border-radius: var(--radius-md); border: 1px solid var(--border); }

        /* Navigation Tabs */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: var(--bg-secondary);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand-title">My CHAIN ⛓️‍💥 Link</div>
        <button class="btn-gold" onclick="startCapture()">Capture</button>
    </nav>

    <div class="main-feed">
        <div class="tagline">Link up with your chain ⛓🔗⛓</div>
        <div id="posts-container">
            </div>
    </div>

    <div id="cameraInterface" class="camera-overlay">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div style="margin-top: 20px; display: flex; gap: 15px;">
            <button class="btn-gold" onclick="capturePhoto()">Take Photo</button>
            <button class="btn-gold" style="background: #333; color: #fff;" onclick="stopCapture()">Cancel</button>
        </div>
    </div>

    <div class="tab-bar">
        <span onclick="navigate('home')">🏠</span>
        <span onclick="navigate('explore')">🔍</span>
        <span onclick="navigate('notifications')">🔔</span>
        <span onclick="navigate('profile')">👤</span>
    </div>

    <script>
        // ========== PROJECT CREDENTIALS (from Supabase key.pdf) ==========
        const SUPABASE_URL = 'https://vjaevzohcnejkaduvtno.supabase.com';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0ZG50cGhicHRjdXpmbmtxaGV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMjE4NTUsImV4cCI6MjA4NTg5Nzg1NX0.6WdINNX8fS33ZAGnaGVCcSxDNAr_H0g7drdwk2seYCg';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ========== CAMERA-ONLY LOGIC ==========
        let localStream = null;

        async function startCapture() {
            const overlay = document.getElementById('cameraInterface');
            const video = document.getElementById('video');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = localStream;
                overlay.classList.add('active');
            } catch (err) {
                alert("Camera access is required to post on My CHAIN Link.");
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/png');
            console.log("Photo ready for Supabase upload:", imageData);
            
            // Proceed to Post creation UI
            alert("Photo captured! Proceeding to post...");
            stopCapture();
        }

        function stopCapture() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('cameraInterface').classList.remove('active');
        }

        function navigate(page) {
            console.log("Navigating to:", page);
            // Feature logic for Explore, Notifications, Profile goes here
        }

        // Initialize and Load Posts
        window.onload = () => {
            console.log("My CHAIN ⛓️‍💥 Link initialized.");
        };
    </script>
</body>
</html>
