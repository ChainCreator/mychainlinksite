        function reactToPost(postId, reaction) {
            const post = state.posts.find(p => p.id === postId);
            if (!post) return;
            if (post.userReaction === reaction) {
                post.reactions[reaction]--;
                post.userReaction = null;
            } else {
                if (post.userReaction) {
                    post.reactions[post.userReaction]--;
                }
                post.reactions[reaction]++;
                post.userReaction = reaction;
            }
            const postEl = document.getElementById('post-' + postId);
            if (postEl) {
                postEl.remove();
                renderPost(post, true);
            }
        }

            state.posts = state.posts.filter(p => p.id !== postId);

            ];
            container.innerHTML = images.map(img => `
                <div class="explore-grid-item" onclick="viewImage('${img}')">
                    <img src="${img}" alt="Explore">
                </div>
            `).join('');
        }

        function handleSearch(event) {
            const query = event.target.value.toLowerCase();
        }

        function searchTopic(topic) {
            document.getElementById('search-input').value = topic;
            showToast(`Searching ${topic}...`, 'info');
        }

        // ==================== NOTIFICATIONS ====================
        function loadNotifications() {
            const container = document.getElementById('notifications-list');
            state.notifications = [
                { id: 1, type: 'love', text: '<strong>Creative Soul</strong> loved your post', time: '2m ago', unread: true },
                { id: 2, type: 'follow', text: '<strong>Art Visionary</strong> started following you', time: '15m ago', unread: true },
                { id: 3, type: 'repeat', text: '<strong>Code Poet</strong> repeated your post', time: '1h ago', unread: false },
                { id: 4, type: 'mention', text: '<strong>Design Guru</strong> mentioned you in a post', time: '3h ago', unread: false }
            ];
            renderNotifications();
        }

        function renderNotifications() {
            const container = document.getElementById('notifications-list');
            if (state.notifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
                            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
                        </svg>
                        <h3>No notifications yet</h3>
                        <p>When you get notifications, they'll appear here.</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = state.notifications.map(n => `
                <div class="notification-item ${n.unread ? 'unread' : ''}" onclick="readNotification(${n.id})">
                    <div class="notification-icon ${n.type}">
                        ${getNotificationIcon(n.type)}
                    </div>
                    <div class="notification-content">
                        <div class="notification-text">${n.text}</div>
                        <div class="notification-time">${n.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function getNotificationIcon(type) {
            const icons = {
                love: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>',
                follow: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20                 follow: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>',
                repeat: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>',
                mention: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path></svg>'
            };
            return icons[type] || icons.love;
        }

        function readNotification(id) {
            const notif = state.notifications.find(n => n.id === id);
            if (notif) notif.unread = false;
            renderNotifications();
        }

        function markAllRead() {
            state.notifications.forEach(n => n.unread = false);
            renderNotifications();
            showToast('All notifications marked as read', 'success');
        }

        function markNotificationsSeen() {}

        function openSpotify() {
            const tracks = ['Blinding Lights - The Weeknd','As It Was - Harry Styles','Heat Waves - Glass Animals','Stay - The Kid LAROI & Justin Bieber'];
            const randomTrack = tracks[Math.floor(Math.random() * tracks.length)];
            document.getElementById('spotify-track').textContent = randomTrack;
            showToast('Connected to Spotify!', 'success');
        }

        function rotateQuote() {
            const quote = state.quotes[Math.floor(Math.random() * state.quotes.length)];
            document.getElementById('quote-text').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('quote-text').textContent = '"' + quote.text + '"';
                document.getElementById('quote-author').textContent = '— ' + quote.author;
                document.getElementById('quote-text').style.opacity = 1;
            }, 500);
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + 'm ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            return Math.floor(hours / 24) + 'd ago';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            const icons = {
                success: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>',
                error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>',
                info: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>'
            };
            toast.innerHTML = icons[type] + '<span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSupabase();
            const savedUser = localStorage.getItem('chainlink_user');
            if (savedUser) {
                state.currentUser = JSON.parse(savedUser);
                generateSampleFollowData();
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                updateProfileUI();
                loadPosts();
                loadNotifications();
                loadTrending();
                loadExploreGrid();
            }
            setInterval(rotateQuote, 10000);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCamera();
                closeImagePreview();
                closeScheduleModal();
                closeFollowModal();
                closePaypalModal();
            }
        });
    </script>
</body>
</html>
