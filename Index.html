<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>CHAIN🔗Link</title>
    <style>
        :root {
            --primary: #d4c76a;
            --primary-hover: #c4b75a;
            --accent: #e8d88a;
            --danger: #e0245e;
            --success: #17bf63;
            --bg: #0d0d0d;
            --bg-card: #1a1a1a;
            --bg-tertiary: #222222;
            --text: #e7e9ea;
            --text-secondary: #71767b;
            --border: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Auth Screen */
        .auth-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
            padding: 20px;
        }

        .auth-card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo { font-size: 3rem; margin-bottom: 10px; }
        
        .btn-auth {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-google { background: white; color: black; }
        .btn-primary { background: var(--primary); color: black; }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--border);
        }

        .nav-item { color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        /* Feed Styling */
        .feed { padding: 20px 15px 80px 15px; max-width: 600px; margin: 0 auto; }
        
        .post-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .post-header { display: flex; align-items: center; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); margin-right: 10px; }
        
        .verified-badge { color: var(--primary); margin-left: 5px; font-size: 0.8rem; }

        .post-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: var(--text-secondary);
        }

        /* Composer */
        .composer {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.1rem;
            resize: none;
            outline: none;
        }

        .font-cursive { font-family: 'Brush Script MT', cursive; }
        .font-mono { font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <div class="logo">🔗</div>
            <h1>CHAIN🔗Link</h1>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">Be You. Connect. Create.</p>
            <button class="btn-auth btn-google" onclick="showApp()">Login with Google</button>
            <button class="btn-auth btn-primary" onclick="showApp()">Get Started</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="feed">
            <div class="composer">
                <textarea placeholder="What's happening?" id="postInput"></textarea>
                <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                    <button class="btn-auth btn-primary" style="width: auto; padding: 8px 20px;" onclick="addPost()">Post</button>
                </div>
            </div>

            <div id="postContainer">
                </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">🔍</div>
            <div class="nav-item">📸</div>
            <div class="nav-item">🔔</div>
            <div class="nav-item">👤</div>
        </nav>
    </div>

    <script>
        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            renderPosts();
        }

        let posts = [
            { author: 'Sarah Chen', handle: '@sarah', content: 'Building something new! 🎨✨', likes: 24 },
            { author: 'Marcus Johnson', handle: '@mj', content: 'The new interface looks clean. 🔗', likes: 156 }
        ];

        function renderPosts() {
            const container = document.getElementById('postContainer');
            container.innerHTML = posts.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <div class="avatar"></div>
                        <div>
                            <strong>${post.author}</strong> <span class="verified-badge">✓</span>
                            <div style="color: var(--text-secondary); font-size: 0.8rem;">${post.handle}</div>
                        </div>
                    </div>
                    <div>${post.content}</div>
                    <div class="post-actions">
                        <span>💬 2</span>
                        <span>🔁 5</span>
                        <span>❤️ ${post.likes}</span>
                    </div>
                </div>
            `).join('');
        }

        function addPost() {
            const input = document.getElementById('postInput');
            if (input.value.trim()) {
                posts.unshift({
                    author: 'User',
                    handle: '@you',
                    content: input.value,
                    likes: 0
                });
                input.value = '';
                renderPosts();
            }
        }
    </script>
</body>
</html>
