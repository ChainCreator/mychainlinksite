<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAIN🔗Link | Authenticity First</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=7WEUUYSTA5HY8&vault=true&intent=subscription&currency=USD"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --primary: #d4c76a; --bg: #0d0d0d; --card: #1a1a1a;
            --text: #e7e9ea; --danger: #e0245e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* View Management */
        .view { display: none; min-height: 100vh; padding-bottom: 90px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Components */
        header { position: sticky; top: 0; background: rgba(13,13,13,0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #333; z-index: 1000; display: flex; justify-content: space-between; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #71767b; font-size: 1.5rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .post-card { background: var(--card); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .btn-post { background: var(--primary); color: black; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* Policy Modal */
        #policy-modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="policy-modal">
        <div style="max-width: 400px;">
            <h1 style="color: var(--primary); font-size: 2.5rem;">🔗 CHAIN🔗Link</h1>
            <p style="margin: 20px 0; line-height: 1.6;">Authenticity is our core. By entering, you agree to our <strong>Anti-Bullying & Harassment Policy</strong>. Respect the truth of others.</p>
            <button onclick="unlockApp()" class="btn-post" style="padding: 15px 40px;">I Vow to be Authentic</button>
        </div>
    </div>

    <div id="app-wrapper" style="display: none;">
        <header>
            <div style="font-weight: 900; color: var(--primary);">CHAIN🔗Link</div>
            <div id="live-indicator" style="display:none; color:var(--danger); font-size: 0.8rem; font-weight: bold;">● LIVE</div>
        </header>

        <main id="home-view" class="view active">
            <div style="padding: 15px; border-bottom: 1px solid #333;">
                <textarea id="post-text" placeholder="Speak your truth..." style="width:100%; background:none; border:none; color:white; font-size:1.1rem; outline:none; resize:none;"></textarea>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div style="display:flex; gap:15px; color:#71767b;">
                        <i class="fa-solid fa-camera" style="cursor:pointer;"></i>
                        <i class="fa-solid fa-comment-slash" title="Toggle Comments" style="cursor:pointer;" onclick="toggleComments()"></i>
                    </div>
                    <button class="btn-post" onclick="handlePostSubmit()">Post</button>
                </div>
            </div>
            <div id="feed-container"></div>
        </main>

        <main id="live-view" class="view">
            <div style="padding: 20px; text-align: center;">
                <div id="stream-box" style="width:100%; aspect-ratio:9/16; background:#000; border-radius:20px; overflow:hidden; position:relative;">
                    <video id="webcam-preview" autoplay muted playsinline style="width:100%; height:100%; object-fit:cover;"></video>
                </div>
                <button id="live-btn" onclick="initMuxStream()" class="btn-post" style="margin-top:20px; background:var(--danger); color:white; width: 80%;">START AUTHENTIC LIVE</button>
            </div>
        </main>

        <main id="vault-view" class="view">
            <div style="padding: 20px; text-align: center;">
                <h2 style="color:var(--primary);">Creator Vault</h2>
                <p style="color:#71767b;">Support creators with an Authentic Subscription.</p>
                <div class="post-card" style="margin-top:30px;">
                    <h3>Monthly Supporter</h3>
                    <h1 style="margin: 10px 0;">$4.99</h1>
                    <div id="paypal-button-container"></div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="switchTab('live')"><i class="fa-solid fa-video"></i></div>
            <div class="nav-item" onclick="switchTab('vault')"><i class="fa-solid fa-gem"></i></div>
            <div class="nav-item" onclick="switchTab('profile')"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

    <script>
        // --- INITIALIZATION ---
        const _supabase = supabase.createClient(
            'https://vjaevzohcnejkaduvtno.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqYWV2em9oY25lamthZHV2dG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0MTMzMDcsImV4cCI6MjA4NTk4OTMwN30.d6tcsct8aFqUZXBnR_3S7okNBvH6Csc1QBqGwlG6CWs'
        );

        function unlockApp() {
            document.getElementById('policy-modal').style.display = 'none';
            document.getElementById('app-wrapper').style.display = 'block';
            loadFeed();
            initPaypal();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId + '-view').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- FEED LOGIC ---
        async function handlePostSubmit() {
            const content = document.getElementById('post-text').value;
            if(!content) return;

            const { error } = await _supabase.from('posts').insert([{ content, likes_count: 0 }]);
            if(!error) {
                document.getElementById('post-text').value = '';
                loadFeed();
            }
        }

        async function loadFeed() {
            const { data, error } = await _supabase.from('posts').select('*').order('created_at', {ascending: false});
            const container = document.getElementById('feed-container');
            if(data) {
                container.innerHTML = data.map(post => `
                    <div class="post-card">
                        <p>${post.content}</p>
                        <div style="display:flex; gap:20px; color:#71767b; margin-top:10px;">
                            <span>❤️ ${post.likes_count || 0}</span>
                            <span onclick="alert('Community Dislike Recorded')">👎</span>
                            <i class="fa-regular fa-comment"></i>
                        </div>
                    </div>
                `).join('');
            }
        }

        // --- MUX LIVE STREAMING MOCKUP ---
        async function initMuxStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('webcam-preview').srcObject = stream;
                document.getElementById('live-indicator').style.display = 'block';
                document.getElementById('live-btn').innerText = "LIVE ON AIR";
                console.log("Connect to Mux with Stream Key: [Your Mux Key Here]");
            } catch (err) {
                alert("Camera access is required for authentic streaming.");
            }
        }

        // --- PAYPAL INTEGRATION ---
        function initPaypal() {
            paypal.Buttons({
                createSubscription: function(data, actions) {
                    return actions.subscription.create({ 'plan_id': 'P-YOUR_PLAN_ID' });
                },
                onApprove: function(data, actions) {
                    alert('Subscription Successful! Welcome to the Inner Circle.');
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
